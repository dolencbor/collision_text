<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editable Text Collision Poster</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #050505;
      --paper: #f4f3f1;
      --panel: #ffffff;
      --line: #d8d6d0;
      --muted: #6b6861;
      --focus: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      background: #f7f6f3;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .controls {
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .section-title {
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: #2d2a25;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #34322e;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgb(31 111 235 / 14%);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #111;
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px;
      align-items: center;
      gap: 10px;
    }

    .value {
      min-width: 58px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: right;
      font-size: 13px;
      color: #211f1b;
      background: #fafafa;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 8px 0 16px;
      font-size: 14px;
      color: #2d2a25;
    }

    .check-row input {
      width: 17px;
      height: 17px;
      accent-color: #111;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid #111;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #111;
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      overflow: auto;
    }

    #posterSvg {
      width: min(76vw, 820px);
      height: auto;
      overflow: visible;
    }

    .poster-bg {
      fill: var(--paper);
    }

    .main-text,
    .grid-text {
      fill: #000;
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0;
      dominant-baseline: alphabetic;
    }

    .clearance-mask,
    .debug-mask {
      image-rendering: auto;
    }

    .debug-mask {
      opacity: 0.12;
      image-rendering: pixelated;
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
      }

      .controls {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        min-height: 0;
      }

      #posterSvg {
        width: min(92vw, 720px);
      }
    }
  </style>
</head>
<body>
  <aside class="controls">
    <h1>Collision Text Poster</h1>

    <div class="control">
      <label for="mainText">Editable text</label>
      <input id="mainText" type="text" value="Save the Date">
    </div>

    <div class="control">
      <label for="mainScale">Main text scale</label>
      <div class="range-row">
        <input id="mainScale" type="range" min="65" max="125" value="92">
        <output id="mainScaleValue" class="value">92%</output>
      </div>
    </div>

    <div class="control">
      <label for="outlinePx">Collision outline</label>
      <div class="range-row">
        <input id="outlinePx" type="range" min="0" max="90" value="30">
        <output id="outlineValue" class="value">30px</output>
      </div>
    </div>

    <div class="control">
      <label for="edgePx">Poster edge</label>
      <div class="range-row">
        <input id="edgePx" type="range" min="0" max="80" value="18">
        <output id="edgeValue" class="value">18px</output>
      </div>
    </div>

    <div class="section-title">Grid</div>

    <div class="control">
      <label for="gridText">Grid text</label>
      <input id="gridText" type="text" value="INDIGO 2026">
    </div>

    <div class="control">
      <label for="gridSize">Grid text size</label>
      <div class="range-row">
        <input id="gridSize" type="range" min="28" max="96" value="56">
        <output id="gridSizeValue" class="value">56px</output>
      </div>
    </div>

    <div class="control">
      <label for="columnGap">Horizontal tiling</label>
      <div class="range-row">
        <input id="columnGap" type="range" min="-20" max="180" value="44">
        <output id="columnGapValue" class="value">44px</output>
      </div>
    </div>

    <div class="control">
      <label for="rowGap">Vertical tiling</label>
      <div class="range-row">
        <input id="rowGap" type="range" min="-10" max="80" value="7">
        <output id="rowGapValue" class="value">7px</output>
      </div>
    </div>

    <div class="control">
      <label for="gridSpeed">Left drift speed</label>
      <div class="range-row">
        <input id="gridSpeed" type="range" min="0" max="90" value="14">
        <output id="gridSpeedValue" class="value">14</output>
      </div>
    </div>

    <div class="section-title">Motion</div>

    <div class="control">
      <label for="floatAmount">Float amount</label>
      <div class="range-row">
        <input id="floatAmount" type="range" min="0" max="28" value="3">
        <output id="floatAmountValue" class="value">3px</output>
      </div>
    </div>

    <div class="control">
      <label for="floatSpeed">Float speed</label>
      <div class="range-row">
        <input id="floatSpeed" type="range" min="0" max="120" value="22">
        <output id="floatSpeedValue" class="value">22</output>
      </div>
    </div>

    <div class="control">
      <label for="dodgeRange">Collision push</label>
      <div class="range-row">
        <input id="dodgeRange" type="range" min="0" max="260" value="120">
        <output id="dodgeRangeValue" class="value">120</output>
      </div>
    </div>

    <div class="control">
      <label for="wordGap">Word collision gap</label>
      <div class="range-row">
        <input id="wordGap" type="range" min="0" max="40" value="6">
        <output id="wordGapValue" class="value">6px</output>
      </div>
    </div>

    <label class="check-row">
      <input id="showMask" type="checkbox">
      Show collision mask
    </label>

    <div class="actions">
      <button id="resetMotion" class="secondary" type="button">Reset</button>
      <button id="exportSvg" type="button">Export SVG</button>
    </div>

    <div id="count" class="meta"></div>
  </aside>

  <main class="stage">
    <svg id="posterSvg" viewBox="0 0 900 1100" role="img" aria-label="Generated text collision poster">
      <rect width="900" height="1100" fill="#f7f6f3"></rect>
      <g id="posterGroup" transform="translate(70 70)">
        <defs>
          <clipPath id="posterClip">
            <rect width="760" height="960"></rect>
          </clipPath>
        </defs>
        <rect class="poster-bg" width="760" height="960"></rect>
        <g id="gridLayer" clip-path="url(#posterClip)"></g>
        <g id="clearanceLayer"></g>
        <g id="debugLayer"></g>
        <g id="mainLayer"></g>
      </g>
    </svg>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const POSTER = { width: 760, height: 960 };
    const SCALE = 2;
    const FONT_STACK = "Arial Black, Arial, Helvetica, sans-serif";
    const PAPER = [244, 243, 241];

    const els = {
      mainText: document.querySelector("#mainText"),
      mainScale: document.querySelector("#mainScale"),
      mainScaleValue: document.querySelector("#mainScaleValue"),
      outlinePx: document.querySelector("#outlinePx"),
      outlineValue: document.querySelector("#outlineValue"),
      edgePx: document.querySelector("#edgePx"),
      edgeValue: document.querySelector("#edgeValue"),
      gridText: document.querySelector("#gridText"),
      gridSize: document.querySelector("#gridSize"),
      gridSizeValue: document.querySelector("#gridSizeValue"),
      columnGap: document.querySelector("#columnGap"),
      columnGapValue: document.querySelector("#columnGapValue"),
      rowGap: document.querySelector("#rowGap"),
      rowGapValue: document.querySelector("#rowGapValue"),
      gridSpeed: document.querySelector("#gridSpeed"),
      gridSpeedValue: document.querySelector("#gridSpeedValue"),
      floatAmount: document.querySelector("#floatAmount"),
      floatAmountValue: document.querySelector("#floatAmountValue"),
      floatSpeed: document.querySelector("#floatSpeed"),
      floatSpeedValue: document.querySelector("#floatSpeedValue"),
      dodgeRange: document.querySelector("#dodgeRange"),
      dodgeRangeValue: document.querySelector("#dodgeRangeValue"),
      wordGap: document.querySelector("#wordGap"),
      wordGapValue: document.querySelector("#wordGapValue"),
      showMask: document.querySelector("#showMask"),
      resetMotion: document.querySelector("#resetMotion"),
      exportSvg: document.querySelector("#exportSvg"),
      count: document.querySelector("#count"),
      svg: document.querySelector("#posterSvg"),
      gridLayer: document.querySelector("#gridLayer"),
      clearanceLayer: document.querySelector("#clearanceLayer"),
      debugLayer: document.querySelector("#debugLayer"),
      mainLayer: document.querySelector("#mainLayer")
    };

    const measureCanvas = document.createElement("canvas");
    const measureCtx = measureCanvas.getContext("2d");
    const maskCanvas = document.createElement("canvas");
    const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });
    const clearanceCanvas = document.createElement("canvas");
    const clearanceCtx = clearanceCanvas.getContext("2d", { willReadFrequently: true });

    maskCanvas.width = POSTER.width * SCALE;
    maskCanvas.height = POSTER.height * SCALE;
    clearanceCanvas.width = maskCanvas.width;
    clearanceCanvas.height = maskCanvas.height;

    let tiles = [];
    let mainLayout = [];
    let gridSignatureValue = "";
    let gridOffset = 0;
    let lastFrame = performance.now();

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function numberValue(element) {
      return Number(element.value);
    }

    function font(size) {
      return `900 ${size}px ${FONT_STACK}`;
    }

    function normalizeLines(text) {
      const trimmed = text.trim() || "Save the Date";
      if (trimmed.includes("\n")) {
        return trimmed.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      }
      return trimmed.split(/\s+/).filter(Boolean);
    }

    function metricsFor(text, size) {
      measureCtx.font = font(size);
      const metrics = measureCtx.measureText(text);
      return {
        width: metrics.width,
        ascent: metrics.actualBoundingBoxAscent || size * 0.78,
        descent: metrics.actualBoundingBoxDescent || size * 0.18,
        left: metrics.actualBoundingBoxLeft || 0,
        right: metrics.actualBoundingBoxRight || metrics.width
      };
    }

    function fitSize(text, maxWidth, maxHeight, maxSize) {
      const at100 = metricsFor(text, 100).width || 100;
      const widthSize = (maxWidth / at100) * 100;
      return clamp(Math.min(widthSize, maxHeight), 48, maxSize);
    }

    function buildMainLayout(text) {
      const lines = normalizeLines(text).slice(0, 5);
      const scale = numberValue(els.mainScale) / 100;
      const topPad = 86;
      const bottomPad = 98;
      const sidePad = 40;
      const availableHeight = POSTER.height - topPad - bottomPad;
      const band = availableHeight / lines.length;

      return lines.map((line, index) => {
        const fitted = fitSize(line, POSTER.width - sidePad * 2, band * 0.98, 250);
        const size = fitted * scale;
        const metrics = metricsFor(line, size);
        const x = (POSTER.width - metrics.width) / 2;
        const y = topPad + band * index + band * 0.7;
        return { text: line, x, y, size, metrics };
      });
    }

    function drawMainTextToContext(ctx, layout, outlinePx) {
      const radius = Math.max(0, outlinePx);
      const step = radius <= 2 ? 1 : Math.max(2, Math.round(radius / 9));
      const offsets = [];

      if (radius === 0) {
        offsets.push([0, 0]);
      } else {
        for (let dx = -radius; dx <= radius; dx += step) {
          for (let dy = -radius; dy <= radius; dy += step) {
            if (dx * dx + dy * dy <= radius * radius) offsets.push([dx, dy]);
          }
        }
        offsets.push([0, 0]);
      }

      ctx.fillStyle = "#000";
      layout.forEach((item) => {
        ctx.font = font(item.size);
        offsets.forEach(([dx, dy]) => ctx.fillText(item.text, item.x + dx, item.y + dy));
      });
    }

    function closeMaskHoles(imageData) {
      const { data, width, height } = imageData;
      const total = width * height;
      const outside = new Uint8Array(total);
      const queue = new Int32Array(total);
      let head = 0;
      let tail = 0;

      function enqueue(index) {
        if (outside[index]) return;
        if (data[index * 4 + 3] > 12) return;
        outside[index] = 1;
        queue[tail] = index;
        tail += 1;
      }

      for (let x = 0; x < width; x += 1) {
        enqueue(x);
        enqueue((height - 1) * width + x);
      }

      for (let y = 0; y < height; y += 1) {
        enqueue(y * width);
        enqueue(y * width + width - 1);
      }

      while (head < tail) {
        const index = queue[head];
        head += 1;
        const x = index % width;
        const y = (index - x) / width;

        if (x > 0) enqueue(index - 1);
        if (x < width - 1) enqueue(index + 1);
        if (y > 0) enqueue(index - width);
        if (y < height - 1) enqueue(index + width);
      }

      for (let index = 0; index < total; index += 1) {
        const alphaIndex = index * 4 + 3;
        if (data[alphaIndex] <= 12 && outside[index] === 0) {
          data[index * 4] = 0;
          data[index * 4 + 1] = 0;
          data[index * 4 + 2] = 0;
          data[alphaIndex] = 255;
        }
      }
    }

    function updateClearanceCanvas(imageData) {
      const clearance = clearanceCtx.createImageData(imageData.width, imageData.height);

      for (let i = 0; i < imageData.data.length; i += 4) {
        if (imageData.data[i + 3] <= 12) continue;
        clearance.data[i] = PAPER[0];
        clearance.data[i + 1] = PAPER[1];
        clearance.data[i + 2] = PAPER[2];
        clearance.data[i + 3] = 255;
      }

      clearanceCtx.putImageData(clearance, 0, 0);
    }

    function buildCollisionMask(layout, outlinePx) {
      maskCtx.setTransform(1, 0, 0, 1, 0, 0);
      maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
      maskCtx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
      drawMainTextToContext(maskCtx, layout, outlinePx);
      maskCtx.setTransform(1, 0, 0, 1, 0, 0);
      const imageData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
      closeMaskHoles(imageData);
      maskCtx.putImageData(imageData, 0, 0);
      updateClearanceCanvas(imageData);
      return imageData.data;
    }

    function renderMain(layout) {
      clear(els.mainLayer);
      layout.forEach((item) => {
        const text = svgEl("text", {
          class: "main-text",
          x: item.x.toFixed(2),
          y: item.y.toFixed(2),
          "font-size": item.size.toFixed(2)
        });
        text.textContent = item.text;
        els.mainLayer.appendChild(text);
      });
    }

    function renderClearance() {
      clear(els.clearanceLayer);
      els.clearanceLayer.appendChild(svgEl("image", {
        class: "clearance-mask",
        x: 0,
        y: 0,
        width: POSTER.width,
        height: POSTER.height,
        href: clearanceCanvas.toDataURL("image/png")
      }));
    }

    function renderDebugMask(show) {
      clear(els.debugLayer);
      if (!show) return;
      els.debugLayer.appendChild(svgEl("image", {
        class: "debug-mask",
        x: 0,
        y: 0,
        width: POSTER.width,
        height: POSTER.height,
        href: maskCanvas.toDataURL("image/png")
      }));
    }

    function gridSignature() {
      return [
        els.gridText.value,
        els.gridSize.value,
        els.columnGap.value,
        els.rowGap.value,
        els.wordGap.value
      ].join("|");
    }

    function rebuildGrid() {
      clear(els.gridLayer);
      tiles = [];
      gridOffset = 0;

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const wordGap = numberValue(els.wordGap);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap) + wordGap, 80);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap) + wordGap, 20);
      const rows = Math.ceil((POSTER.height + cellH) / cellH);
      const cols = Math.ceil((POSTER.width + cellW * 2) / cellW);

      for (let row = 0; row < rows; row += 1) {
        for (let col = -1; col < cols; col += 1) {
          const node = svgEl("text", {
            class: "grid-text",
            "font-size": size.toFixed(2)
          });
          node.textContent = text;
          els.gridLayer.appendChild(node);
          tiles.push({
            row,
            col,
            node,
            size,
            text,
            metrics,
            phase: row * 1.73 + col * 0.91
          });
        }
      }

      gridSignatureValue = gridSignature();
    }

    function pushFromHeadline(x, y) {
      const range = numberValue(els.dodgeRange);
      if (range <= 0 || mainLayout.length === 0) return { x, y };

      let pushX = 0;
      let pushY = 0;
      const maxPush = Math.min(26, range * 0.11);

      mainLayout.forEach((item) => {
        const box = {
          left: item.x - numberValue(els.outlinePx),
          right: item.x + item.metrics.width + numberValue(els.outlinePx),
          top: item.y - item.metrics.ascent - numberValue(els.outlinePx),
          bottom: item.y + item.metrics.descent + numberValue(els.outlinePx)
        };
        const nearestX = clamp(x, box.left, box.right);
        const nearestY = clamp(y, box.top, box.bottom);
        const dx = x - nearestX;
        const dy = y - nearestY;
        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
        const influence = clamp(1 - distance / range, 0, 1);

        if (influence > 0) {
          const sideX = x < (box.left + box.right) / 2 ? -1 : 1;
          const sideY = y < (box.top + box.bottom) / 2 ? -1 : 1;
          const nx = Math.abs(dx) > 0.01 ? dx / distance : sideX * 0.35;
          const ny = Math.abs(dy) > 0.01 ? dy / distance : sideY * 0.35;
          pushX += nx * influence * maxPush;
          pushY += ny * influence * maxPush * 0.45;
        }
      });

      return { x: x + pushX, y: y + pushY };
    }

    function layoutGrid(time) {
      if (gridSignatureValue !== gridSignature()) rebuildGrid();

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const wordGap = numberValue(els.wordGap);
      const edgePx = numberValue(els.edgePx);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap) + wordGap, 80);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap) + wordGap, 20);
      const floatAmount = numberValue(els.floatAmount);
      const floatSpeed = numberValue(els.floatSpeed) * 0.001;
      const wave = time * floatSpeed;
      let visibleCount = 0;

      tiles.forEach((tile) => {
        tile.size = size;
        tile.text = text;
        tile.metrics = metrics;
        tile.node.textContent = text;
        tile.node.setAttribute("font-size", size.toFixed(2));

        const wrappedX = tile.col * cellW + edgePx - gridOffset;
        const baseY = tile.row * cellH + metrics.ascent + edgePx;
        const anchorX = wrappedX + Math.sin(wave + tile.phase) * floatAmount;
        const anchorY = baseY + Math.cos(wave * 0.78 + tile.phase * 1.23) * floatAmount * 0.55;
        const pushed = pushFromHeadline(anchorX + metrics.width / 2, anchorY - metrics.ascent / 2);
        const x = anchorX + (pushed.x - (anchorX + metrics.width / 2));
        const y = anchorY + (pushed.y - (anchorY - metrics.ascent / 2));
        const visible = y > -cellH && y < POSTER.height + cellH;

        tile.node.setAttribute("x", x.toFixed(2));
        tile.node.setAttribute("y", y.toFixed(2));
        tile.node.style.display = visible ? "" : "none";

        if (visible) {
          visibleCount += 1;
        }
      });

      els.count.textContent = `${visibleCount} grid words moving behind the editable collision outline`;
    }

    function updateReadouts() {
      els.mainScaleValue.textContent = `${els.mainScale.value}%`;
      els.outlineValue.textContent = `${els.outlinePx.value}px`;
      els.edgeValue.textContent = `${els.edgePx.value}px`;
      els.gridSizeValue.textContent = `${els.gridSize.value}px`;
      els.columnGapValue.textContent = `${els.columnGap.value}px`;
      els.rowGapValue.textContent = `${els.rowGap.value}px`;
      els.gridSpeedValue.textContent = els.gridSpeed.value;
      els.floatAmountValue.textContent = `${els.floatAmount.value}px`;
      els.floatSpeedValue.textContent = els.floatSpeed.value;
      els.dodgeRangeValue.textContent = els.dodgeRange.value;
      els.wordGapValue.textContent = `${els.wordGap.value}px`;
    }

    function rebuildScene() {
      updateReadouts();
      mainLayout = buildMainLayout(els.mainText.value);
      renderMain(mainLayout);
      buildCollisionMask(mainLayout, numberValue(els.outlinePx));
      renderClearance();
      renderDebugMask(els.showMask.checked);
      layoutGrid(performance.now());
    }

    function exportSvg() {
      const clone = els.svg.cloneNode(true);
      const debug = clone.querySelector("#debugLayer");
      if (debug) debug.replaceChildren();
      clone.setAttribute("xmlns", SVG_NS);

      const source = `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
      const blob = new Blob([source], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "collision-text-poster.svg";
      link.click();
      URL.revokeObjectURL(url);
    }

    function animate(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(els.gridText.value.trim().toUpperCase() || "INDIGO 2026", size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap) + numberValue(els.wordGap), 80);
      gridOffset = (gridOffset + numberValue(els.gridSpeed) * dt) % cellW;
      layoutGrid(now);
      requestAnimationFrame(animate);
    }

    [
      els.mainText,
      els.mainScale,
      els.outlinePx,
      els.edgePx,
      els.gridText,
      els.gridSize,
      els.columnGap,
      els.rowGap,
      els.floatAmount,
      els.dodgeRange,
      els.wordGap,
      els.showMask
    ].forEach((element) => {
      element.addEventListener("input", rebuildScene);
      element.addEventListener("change", rebuildScene);
    });

    [els.gridSpeed, els.floatSpeed].forEach((element) => {
      element.addEventListener("input", updateReadouts);
      element.addEventListener("change", updateReadouts);
    });

    els.resetMotion.addEventListener("click", () => {
      rebuildGrid();
      rebuildScene();
    });

    els.exportSvg.addEventListener("click", exportSvg);

    rebuildGrid();
    rebuildScene();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
