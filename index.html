<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editable Text Collision Poster</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #050505;
      --paper: #f4f3f1;
      --panel: #ffffff;
      --line: #d8d6d0;
      --muted: #6b6861;
      --focus: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      background: #f7f6f3;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .controls {
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .section-title {
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: #2d2a25;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #34322e;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgb(31 111 235 / 14%);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #111;
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px;
      align-items: center;
      gap: 10px;
    }

    .value {
      min-width: 58px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: right;
      font-size: 13px;
      color: #211f1b;
      background: #fafafa;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 8px 0 16px;
      font-size: 14px;
      color: #2d2a25;
    }

    .check-row input {
      width: 17px;
      height: 17px;
      accent-color: #111;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid #111;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #111;
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      overflow: auto;
    }

    #posterSvg {
      width: min(76vw, 820px);
      height: auto;
      overflow: visible;
    }

    .poster-bg {
      fill: var(--paper);
    }

    .main-text,
    .grid-text,
    .svg-obstacle {
      fill: #000;
    }

    .main-text,
    .grid-text {
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0;
      dominant-baseline: alphabetic;
    }

    .grid-text {
      will-change: transform;
    }

    .debug-mask {
      opacity: 0.12;
      image-rendering: pixelated;
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
      }

      .controls {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        min-height: 0;
      }

      #posterSvg {
        width: min(92vw, 720px);
      }
    }
  </style>
</head>
<body>
  <aside class="controls">
    <h1>Collision Text Poster</h1>

    <div class="control">
      <label for="mainText">Editable text</label>
      <input id="mainText" type="text" value="Save the Date">
    </div>

    <div class="control">
      <label for="mainScale">Main text scale</label>
      <div class="range-row">
        <input id="mainScale" type="range" min="70" max="135" value="105">
        <output id="mainScaleValue" class="value">105%</output>
      </div>
    </div>

    <div class="control">
      <label for="outlinePx">Invisible outline</label>
      <div class="range-row">
        <input id="outlinePx" type="range" min="0" max="90" value="24">
        <output id="outlineValue" class="value">24px</output>
      </div>
    </div>

    <div class="control">
      <label for="edgePx">Poster edge</label>
      <div class="range-row">
        <input id="edgePx" type="range" min="0" max="80" value="18">
        <output id="edgeValue" class="value">18px</output>
      </div>
    </div>

    <div class="section-title">Grid</div>

    <div class="control">
      <label for="gridText">Grid text</label>
      <input id="gridText" type="text" value="INDIGO 2026">
    </div>

    <div class="control">
      <label for="gridSize">Grid text size</label>
      <div class="range-row">
        <input id="gridSize" type="range" min="28" max="96" value="58">
        <output id="gridSizeValue" class="value">58px</output>
      </div>
    </div>

    <div class="control">
      <label for="columnGap">Horizontal tiling</label>
      <div class="range-row">
        <input id="columnGap" type="range" min="-20" max="180" value="42">
        <output id="columnGapValue" class="value">42px</output>
      </div>
    </div>

    <div class="control">
      <label for="rowGap">Vertical tiling</label>
      <div class="range-row">
        <input id="rowGap" type="range" min="-10" max="80" value="8">
        <output id="rowGapValue" class="value">8px</output>
      </div>
    </div>

    <div class="control">
      <label for="gridSpeed">Left drift speed</label>
      <div class="range-row">
        <input id="gridSpeed" type="range" min="0" max="90" value="12">
        <output id="gridSpeedValue" class="value">12</output>
      </div>
    </div>

    <div class="section-title">Motion</div>

    <div class="control">
      <label for="floatAmount">Float amount</label>
      <div class="range-row">
        <input id="floatAmount" type="range" min="0" max="32" value="7">
        <output id="floatAmountValue" class="value">7px</output>
      </div>
    </div>

    <div class="control">
      <label for="floatSpeed">Float speed</label>
      <div class="range-row">
        <input id="floatSpeed" type="range" min="0" max="120" value="28">
        <output id="floatSpeedValue" class="value">28</output>
      </div>
    </div>

    <div class="control">
      <label for="maskStrength">Headline collision</label>
      <div class="range-row">
        <input id="maskStrength" type="range" min="0" max="100" value="54">
        <output id="maskStrengthValue" class="value">54</output>
      </div>
    </div>

    <div class="control">
      <label for="wordStrength">Word collision</label>
      <div class="range-row">
        <input id="wordStrength" type="range" min="0" max="100" value="32">
        <output id="wordStrengthValue" class="value">32</output>
      </div>
    </div>

    <div class="control">
      <label for="returnStrength">Grid pull</label>
      <div class="range-row">
        <input id="returnStrength" type="range" min="0" max="100" value="46">
        <output id="returnStrengthValue" class="value">46</output>
      </div>
    </div>

    <label class="check-row">
      <input id="showMask" type="checkbox">
      Show collision mask
    </label>

    <div class="actions">
      <button id="resetMotion" class="secondary" type="button">Reset</button>
      <button id="exportSvg" type="button">Export SVG</button>
    </div>

    <div id="count" class="meta"></div>
  </aside>

  <main class="stage">
    <svg id="posterSvg" viewBox="0 0 900 1100" role="img" aria-label="Generated text collision poster">
      <rect width="900" height="1100" fill="#f7f6f3"></rect>
      <g id="posterGroup" transform="translate(70 70)">
        <defs>
          <clipPath id="posterClip">
            <rect width="760" height="960"></rect>
          </clipPath>
        </defs>
        <rect class="poster-bg" width="760" height="960"></rect>
        <g id="gridLayer" clip-path="url(#posterClip)"></g>
        <g id="debugLayer"></g>
        <g id="mainLayer"></g>
        <g id="shapeLayer"></g>
      </g>
    </svg>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const POSTER = { width: 760, height: 960 };
    const SCALE = 2;
    const FONT_STACK = "Arial Black, Arial, Helvetica, sans-serif";

    const els = {
      mainText: document.querySelector("#mainText"),
      mainScale: document.querySelector("#mainScale"),
      mainScaleValue: document.querySelector("#mainScaleValue"),
      outlinePx: document.querySelector("#outlinePx"),
      outlineValue: document.querySelector("#outlineValue"),
      edgePx: document.querySelector("#edgePx"),
      edgeValue: document.querySelector("#edgeValue"),
      gridText: document.querySelector("#gridText"),
      gridSize: document.querySelector("#gridSize"),
      gridSizeValue: document.querySelector("#gridSizeValue"),
      columnGap: document.querySelector("#columnGap"),
      columnGapValue: document.querySelector("#columnGapValue"),
      rowGap: document.querySelector("#rowGap"),
      rowGapValue: document.querySelector("#rowGapValue"),
      gridSpeed: document.querySelector("#gridSpeed"),
      gridSpeedValue: document.querySelector("#gridSpeedValue"),
      floatAmount: document.querySelector("#floatAmount"),
      floatAmountValue: document.querySelector("#floatAmountValue"),
      floatSpeed: document.querySelector("#floatSpeed"),
      floatSpeedValue: document.querySelector("#floatSpeedValue"),
      maskStrength: document.querySelector("#maskStrength"),
      maskStrengthValue: document.querySelector("#maskStrengthValue"),
      wordStrength: document.querySelector("#wordStrength"),
      wordStrengthValue: document.querySelector("#wordStrengthValue"),
      returnStrength: document.querySelector("#returnStrength"),
      returnStrengthValue: document.querySelector("#returnStrengthValue"),
      showMask: document.querySelector("#showMask"),
      resetMotion: document.querySelector("#resetMotion"),
      exportSvg: document.querySelector("#exportSvg"),
      count: document.querySelector("#count"),
      svg: document.querySelector("#posterSvg"),
      gridLayer: document.querySelector("#gridLayer"),
      debugLayer: document.querySelector("#debugLayer"),
      mainLayer: document.querySelector("#mainLayer"),
      shapeLayer: document.querySelector("#shapeLayer")
    };

    const measureCanvas = document.createElement("canvas");
    const measureCtx = measureCanvas.getContext("2d");
    const maskCanvas = document.createElement("canvas");
    const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });

    maskCanvas.width = POSTER.width * SCALE;
    maskCanvas.height = POSTER.height * SCALE;

    let particles = [];
    let maskData = null;
    let repelCenters = [];
    let layoutSignature = "";
    let gridOffset = 0;
    let lastFrame = performance.now();

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function font(size) {
      return `900 ${size}px ${FONT_STACK}`;
    }

    function numberValue(element) {
      return Number(element.value);
    }

    function normalizeLines(text) {
      const trimmed = text.trim() || "Save the Date";
      if (trimmed.includes("\n")) {
        return trimmed.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      }
      return trimmed.split(/\s+/).filter(Boolean);
    }

    function metricsFor(text, size) {
      measureCtx.font = font(size);
      const metrics = measureCtx.measureText(text);
      return {
        width: metrics.width,
        ascent: metrics.actualBoundingBoxAscent || size * 0.78,
        descent: metrics.actualBoundingBoxDescent || size * 0.18,
        left: metrics.actualBoundingBoxLeft || 0,
        right: metrics.actualBoundingBoxRight || metrics.width
      };
    }

    function fitSize(text, maxWidth, maxHeight, maxSize) {
      const at100 = metricsFor(text, 100).width || 100;
      const widthSize = (maxWidth / at100) * 100;
      return clamp(Math.min(widthSize, maxHeight), 48, maxSize);
    }

    function buildMainLayout(text) {
      const lines = normalizeLines(text).slice(0, 5);
      const scale = numberValue(els.mainScale) / 100;
      const bottomReserve = 164;
      const topPad = 68;
      const sidePad = 32;
      const availableHeight = POSTER.height - topPad - bottomReserve;
      const band = availableHeight / lines.length;

      return lines.map((line, index) => {
        const fitted = fitSize(line, POSTER.width - sidePad * 2, band * 1.05, 285);
        const size = fitted * scale;
        const metrics = metricsFor(line, size);
        const x = (POSTER.width - metrics.width) / 2;
        const y = topPad + band * index + band * 0.74;
        return { text: line, x, y, size, metrics };
      });
    }

    function shapeObstacle() {
      return {
        x: 48,
        y: 806,
        width: 664,
        height: 92,
        radius: 46
      };
    }

    function drawRoundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawMainTextToContext(ctx, layout, outlinePx) {
      const radius = Math.max(0, outlinePx);
      const step = radius <= 2 ? 1 : Math.max(2, Math.round(radius / 9));
      const offsets = [];

      if (radius === 0) {
        offsets.push([0, 0]);
      } else {
        for (let dx = -radius; dx <= radius; dx += step) {
          for (let dy = -radius; dy <= radius; dy += step) {
            if (dx * dx + dy * dy <= radius * radius) offsets.push([dx, dy]);
          }
        }
        offsets.push([0, 0]);
      }

      ctx.fillStyle = "#000";
      layout.forEach((item) => {
        ctx.font = font(item.size);
        offsets.forEach(([dx, dy]) => ctx.fillText(item.text, item.x + dx, item.y + dy));
      });

      const obstacle = shapeObstacle();
      drawRoundRect(
        ctx,
        obstacle.x - radius,
        obstacle.y - radius,
        obstacle.width + radius * 2,
        obstacle.height + radius * 2,
        obstacle.radius + radius
      );
      ctx.fill();
    }

    function buildCollisionMask(layout, outlinePx) {
      maskCtx.setTransform(1, 0, 0, 1, 0, 0);
      maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
      maskCtx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
      drawMainTextToContext(maskCtx, layout, outlinePx);
      maskCtx.setTransform(1, 0, 0, 1, 0, 0);
      return maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
    }

    function renderMain(layout) {
      clear(els.mainLayer);
      layout.forEach((item) => {
        const text = svgEl("text", {
          class: "main-text",
          x: item.x.toFixed(2),
          y: item.y.toFixed(2),
          "font-size": item.size.toFixed(2)
        });
        text.textContent = item.text;
        els.mainLayer.appendChild(text);
      });
    }

    function renderObstacle() {
      clear(els.shapeLayer);
      const obstacle = shapeObstacle();
      els.shapeLayer.appendChild(svgEl("rect", {
        class: "svg-obstacle",
        x: obstacle.x,
        y: obstacle.y,
        width: obstacle.width,
        height: obstacle.height,
        rx: obstacle.radius,
        ry: obstacle.radius
      }));
    }

    function renderDebugMask(show) {
      clear(els.debugLayer);
      if (!show) return;
      els.debugLayer.appendChild(svgEl("image", {
        class: "debug-mask",
        x: 0,
        y: 0,
        width: POSTER.width,
        height: POSTER.height,
        href: maskCanvas.toDataURL("image/png")
      }));
    }

    function textBox(text, size, x, y) {
      const metrics = metricsFor(text, size);
      return {
        left: x - metrics.left,
        top: y - metrics.ascent,
        right: x + metrics.right,
        bottom: y + metrics.descent,
        width: metrics.width,
        height: metrics.ascent + metrics.descent
      };
    }

    function makeParticle(row, col, x, y, size, text, phase) {
      const metrics = metricsFor(text, size);
      const node = svgEl("text", {
        class: "grid-text",
        "font-size": size.toFixed(2)
      });
      node.textContent = text;
      els.gridLayer.appendChild(node);

      return {
        row,
        col,
        x,
        y,
        vx: 0,
        vy: 0,
        targetX: x,
        targetY: y,
        size,
        text,
        metrics,
        node,
        phase
      };
    }

    function rebuildGrid() {
      clear(els.gridLayer);
      particles = [];
      gridOffset = 0;

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 80);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), 20);
      const rows = Math.ceil((POSTER.height + cellH * 2) / cellH);
      const cols = Math.ceil((POSTER.width + cellW * 3) / cellW);

      for (let row = -1; row < rows; row += 1) {
        for (let col = -1; col < cols; col += 1) {
          const x = col * cellW + 8;
          const y = row * cellH + metrics.ascent + 4;
          const phase = (row * 1.79 + col * 0.93) % (Math.PI * 2);
          particles.push(makeParticle(row, col, x, y, size, text, phase));
        }
      }

      layoutSignature = gridSignature();
    }

    function gridSignature() {
      return [
        els.gridText.value,
        els.gridSize.value,
        els.columnGap.value,
        els.rowGap.value
      ].join("|");
    }

    function buildBoxForParticle(particle, x = particle.x, y = particle.y) {
      return {
        left: x - particle.metrics.left,
        top: y - particle.metrics.ascent,
        right: x + particle.metrics.right,
        bottom: y + particle.metrics.descent,
        width: particle.metrics.width,
        height: particle.metrics.ascent + particle.metrics.descent
      };
    }

    function maskForce(box) {
      if (!maskData) return { x: 0, y: 0, hits: 0 };

      const samplesX = 5;
      const samplesY = 4;
      const centerX = (box.left + box.right) / 2;
      const centerY = (box.top + box.bottom) / 2;
      const stride = maskCanvas.width * 4;
      let forceX = 0;
      let forceY = 0;
      let hits = 0;

      for (let ix = 0; ix < samplesX; ix += 1) {
        const x = box.left + (box.width * ix) / Math.max(1, samplesX - 1);
        if (x < 0 || x >= POSTER.width) continue;
        for (let iy = 0; iy < samplesY; iy += 1) {
          const y = box.top + (box.height * iy) / Math.max(1, samplesY - 1);
          if (y < 0 || y >= POSTER.height) continue;

          const pixelX = clamp(Math.round(x * SCALE), 0, maskCanvas.width - 1);
          const pixelY = clamp(Math.round(y * SCALE), 0, maskCanvas.height - 1);
          const alpha = maskData[pixelY * stride + pixelX * 4 + 3];
          if (alpha <= 12) continue;

          const dx = centerX - x;
          const dy = centerY - y;
          const length = Math.hypot(dx, dy) || 1;
          forceX += dx / length;
          forceY += dy / length;
          hits += 1;
        }
      }

      if (hits > 0 && repelCenters.length > 0) {
        let nearest = repelCenters[0];
        let nearestDistance = Infinity;

        repelCenters.forEach((center) => {
          const distance = Math.hypot(centerX - center.x, centerY - center.y);
          if (distance < nearestDistance) {
            nearest = center;
            nearestDistance = distance;
          }
        });

        const awayX = centerX - nearest.x;
        const awayY = centerY - nearest.y;
        const length = Math.hypot(awayX, awayY) || 1;
        forceX += (awayX / length) * hits * 0.7;
        forceY += (awayY / length) * hits * 0.7;
      }

      return { x: forceX, y: forceY, hits };
    }

    function boxesOverlap(a, b) {
      return !(
        a.right < b.left ||
        a.left > b.right ||
        a.bottom < b.top ||
        a.top > b.bottom
      );
    }

    function applyPairCollisions(dt, strength) {
      if (strength <= 0) return;
      const padded = particles.map((particle) => {
        const box = buildBoxForParticle(particle);
        return {
          particle,
          box: {
            left: box.left - 2,
            top: box.top - 2,
            right: box.right + 2,
            bottom: box.bottom + 2,
            width: box.width + 4,
            height: box.height + 4
          }
        };
      });

      for (let i = 0; i < padded.length; i += 1) {
        for (let j = i + 1; j < padded.length; j += 1) {
          const a = padded[i];
          const b = padded[j];
          if (!boxesOverlap(a.box, b.box)) continue;

          const ax = (a.box.left + a.box.right) / 2;
          const ay = (a.box.top + a.box.bottom) / 2;
          const bx = (b.box.left + b.box.right) / 2;
          const by = (b.box.top + b.box.bottom) / 2;
          const overlapX = Math.min(a.box.right - b.box.left, b.box.right - a.box.left);
          const overlapY = Math.min(a.box.bottom - b.box.top, b.box.bottom - a.box.top);
          const push = Math.min(overlapX, overlapY) * strength * dt * 0.012;

          if (overlapX < overlapY) {
            const dir = ax < bx ? -1 : 1;
            a.particle.vx += dir * push;
            b.particle.vx -= dir * push;
          } else {
            const dir = ay < by ? -1 : 1;
            a.particle.vy += dir * push;
            b.particle.vy -= dir * push;
          }
        }
      }
    }

    function updateTargets(time) {
      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 80);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), 20);
      const floatAmount = numberValue(els.floatAmount);
      const floatSpeed = numberValue(els.floatSpeed) * 0.001;
      const waveTime = time * floatSpeed;

      particles.forEach((particle) => {
        const rawX = particle.col * cellW + 8 - gridOffset;
        const wrappedX = ((rawX + cellW * 2) % (cellW * (Math.ceil((POSTER.width + cellW * 3) / cellW)))) - cellW;
        const baseY = particle.row * cellH + metrics.ascent + 4;
        particle.targetX = wrappedX + Math.sin(waveTime + particle.phase) * floatAmount;
        particle.targetY = baseY + Math.cos(waveTime * 0.82 + particle.phase * 1.31) * floatAmount * 0.6;
      });
    }

    function stepPhysics(time, dt) {
      const speed = numberValue(els.gridSpeed);
      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 80);
      const returnStrength = numberValue(els.returnStrength) / 100;
      const maskStrength = numberValue(els.maskStrength) / 100;
      const wordStrength = numberValue(els.wordStrength);
      const edgePx = numberValue(els.edgePx);

      gridOffset = (gridOffset + speed * dt) % cellW;
      updateTargets(time);

      particles.forEach((particle) => {
        const box = buildBoxForParticle(particle);
        const mask = maskForce(box);
        const anchorX = (particle.targetX - particle.x) * returnStrength * 4.8;
        const anchorY = (particle.targetY - particle.y) * returnStrength * 4.8;
        let forceX = anchorX + mask.x * mask.hits * maskStrength * 42;
        let forceY = anchorY + mask.y * mask.hits * maskStrength * 42;

        if (box.left < edgePx) forceX += (edgePx - box.left) * 2.6;
        if (box.right > POSTER.width - edgePx) forceX -= (box.right - (POSTER.width - edgePx)) * 2.6;
        if (box.top < edgePx) forceY += (edgePx - box.top) * 2.6;
        if (box.bottom > POSTER.height - edgePx) forceY -= (box.bottom - (POSTER.height - edgePx)) * 2.6;

        particle.vx = (particle.vx + forceX * dt) * 0.82;
        particle.vy = (particle.vy + forceY * dt) * 0.82;
      });

      applyPairCollisions(dt, wordStrength);

      particles.forEach((particle) => {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;

        const box = buildBoxForParticle(particle);
        const margin = Math.max(140, box.width);
        if (box.right < -margin) {
          particle.x += cellW * Math.ceil((POSTER.width + cellW * 3) / cellW);
          particle.vx = 0;
        } else if (box.left > POSTER.width + margin) {
          particle.x -= cellW * Math.ceil((POSTER.width + cellW * 3) / cellW);
          particle.vx = 0;
        }

        particle.node.setAttribute("x", particle.x.toFixed(2));
        particle.node.setAttribute("y", particle.y.toFixed(2));
      });
    }

    function updateReadouts() {
      els.mainScaleValue.textContent = `${els.mainScale.value}%`;
      els.outlineValue.textContent = `${els.outlinePx.value}px`;
      els.edgeValue.textContent = `${els.edgePx.value}px`;
      els.gridSizeValue.textContent = `${els.gridSize.value}px`;
      els.columnGapValue.textContent = `${els.columnGap.value}px`;
      els.rowGapValue.textContent = `${els.rowGap.value}px`;
      els.gridSpeedValue.textContent = els.gridSpeed.value;
      els.floatAmountValue.textContent = `${els.floatAmount.value}px`;
      els.floatSpeedValue.textContent = els.floatSpeed.value;
      els.maskStrengthValue.textContent = els.maskStrength.value;
      els.wordStrengthValue.textContent = els.wordStrength.value;
      els.returnStrengthValue.textContent = els.returnStrength.value;
    }

    function rebuildScene() {
      updateReadouts();
      const layout = buildMainLayout(els.mainText.value);
      renderMain(layout);
      renderObstacle();
      const obstacle = shapeObstacle();
      repelCenters = layout.map((item) => ({
        x: item.x + item.metrics.width / 2,
        y: item.y - item.metrics.ascent / 2 + item.metrics.descent / 2
      })).concat({
        x: obstacle.x + obstacle.width / 2,
        y: obstacle.y + obstacle.height / 2
      });
      maskData = buildCollisionMask(layout, numberValue(els.outlinePx));
      renderDebugMask(els.showMask.checked);
      if (layoutSignature !== gridSignature()) rebuildGrid();
      els.count.textContent = `${particles.length} grid words simulated`;
    }

    function exportSvg() {
      const clone = els.svg.cloneNode(true);
      const debug = clone.querySelector("#debugLayer");
      if (debug) debug.replaceChildren();
      clone.setAttribute("xmlns", SVG_NS);

      const source = `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
      const blob = new Blob([source], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "collision-text-poster.svg";
      link.click();
      URL.revokeObjectURL(url);
    }

    function animate(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      if (layoutSignature !== gridSignature()) rebuildGrid();
      stepPhysics(now, dt);
      requestAnimationFrame(animate);
    }

    [
      els.mainText,
      els.mainScale,
      els.outlinePx,
      els.edgePx,
      els.gridText,
      els.gridSize,
      els.columnGap,
      els.rowGap,
      els.gridSpeed,
      els.floatAmount,
      els.floatSpeed,
      els.maskStrength,
      els.wordStrength,
      els.returnStrength,
      els.showMask
    ].forEach((element) => {
      element.addEventListener("input", rebuildScene);
      element.addEventListener("change", rebuildScene);
    });

    els.resetMotion.addEventListener("click", () => {
      rebuildGrid();
      rebuildScene();
    });

    els.exportSvg.addEventListener("click", exportSvg);

    rebuildGrid();
    rebuildScene();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
