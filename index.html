<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editable Text Collision Poster</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #050505;
      --paper: #f4f3f1;
      --panel: #ffffff;
      --line: #d8d6d0;
      --muted: #6b6861;
      --focus: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      background: #f7f6f3;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .controls {
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .section-title {
      margin: 24px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: #2d2a25;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #34322e;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgb(31 111 235 / 14%);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #111;
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px;
      align-items: center;
      gap: 10px;
    }

    .value {
      min-width: 58px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: right;
      font-size: 13px;
      color: #211f1b;
      background: #fafafa;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid #111;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #111;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      overflow: auto;
    }

    #posterSvg {
      width: min(76vw, 820px);
      height: auto;
      overflow: visible;
      touch-action: none;
    }

    .poster-bg {
      fill: var(--paper);
    }

    .main-text,
    .grid-text,
    .mask-text {
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 0;
      dominant-baseline: alphabetic;
    }

    .main-text,
    .grid-text {
      fill: #000;
    }

    .main-text {
      cursor: grab;
      user-select: none;
    }

    .main-text.dragging {
      cursor: grabbing;
    }

    .mask-text {
      fill: var(--paper);
      stroke: var(--paper);
      stroke-linejoin: round;
      stroke-linecap: round;
      pointer-events: none;
    }

    .hit-box {
      fill: transparent;
      cursor: grab;
    }

    .hit-box.dragging {
      cursor: grabbing;
    }

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
      }

      .controls {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        min-height: 0;
      }

      #posterSvg {
        width: min(92vw, 720px);
      }
    }
  </style>
</head>
<body>
  <aside class="controls">
    <h1>Collision Text Poster</h1>

    <div class="control">
      <label for="mainText">Editable text</label>
      <input id="mainText" type="text" value="Save the Date">
    </div>

    <div class="control">
      <label for="wordSize">Word size</label>
      <div class="range-row">
        <input id="wordSize" type="range" min="54" max="240" value="220">
        <output id="wordSizeValue" class="value">220px</output>
      </div>
    </div>

    <div class="control">
      <label for="outlinePx">Invisible mask</label>
      <div class="range-row">
        <input id="outlinePx" type="range" min="0" max="90" value="26">
        <output id="outlineValue" class="value">26px</output>
      </div>
    </div>

    <div class="control">
      <label for="edgePx">Poster edge</label>
      <div class="range-row">
        <input id="edgePx" type="range" min="0" max="90" value="18">
        <output id="edgeValue" class="value">18px</output>
      </div>
    </div>

    <div class="section-title">Grid</div>

    <div class="control">
      <label for="gridText">Grid text</label>
      <input id="gridText" type="text" value="INDIGO 2026">
    </div>

    <div class="control">
      <label for="gridSize">Grid text size</label>
      <div class="range-row">
        <input id="gridSize" type="range" min="24" max="110" value="56">
        <output id="gridSizeValue" class="value">56px</output>
      </div>
    </div>

    <div class="control">
      <label for="columnGap">Grid x padding</label>
      <div class="range-row">
        <input id="columnGap" type="range" min="-40" max="220" value="42">
        <output id="columnGapValue" class="value">42px</output>
      </div>
    </div>

    <div class="control">
      <label for="rowGap">Grid y padding</label>
      <div class="range-row">
        <input id="rowGap" type="range" min="-20" max="110" value="7">
        <output id="rowGapValue" class="value">7px</output>
      </div>
    </div>

    <div class="control">
      <label for="gridSpeed">Grid left speed</label>
      <div class="range-row">
        <input id="gridSpeed" type="range" min="0" max="140" value="18">
        <output id="gridSpeedValue" class="value">18</output>
      </div>
    </div>

    <div class="section-title">Word Physics</div>

    <div class="control">
      <label for="wordGap">Word collision gap</label>
      <div class="range-row">
        <input id="wordGap" type="range" min="0" max="80" value="8">
        <output id="wordGapValue" class="value">8px</output>
      </div>
    </div>

    <div class="control">
      <label for="bounce">Bounce</label>
      <div class="range-row">
        <input id="bounce" type="range" min="20" max="100" value="82">
        <output id="bounceValue" class="value">82%</output>
      </div>
    </div>

    <div class="control">
      <label for="friction">Friction</label>
      <div class="range-row">
        <input id="friction" type="range" min="0" max="8" step="0.1" value="1.2">
        <output id="frictionValue" class="value">1.2</output>
      </div>
    </div>

    <div class="actions">
      <button id="resetWords" class="secondary" type="button">Reset</button>
      <button id="exportSvg" type="button">Export SVG</button>
    </div>
  </aside>

  <main class="stage">
    <svg id="posterSvg" viewBox="0 0 900 1100" role="img" aria-label="Generated text collision poster">
      <rect width="900" height="1100" fill="#f7f6f3"></rect>
      <g id="posterGroup" transform="translate(70 70)">
        <defs>
          <clipPath id="posterClip">
            <rect width="760" height="960"></rect>
          </clipPath>
        </defs>
        <rect class="poster-bg" width="760" height="960"></rect>
        <g id="gridLayer" clip-path="url(#posterClip)"></g>
        <g id="clearanceLayer" clip-path="url(#posterClip)"></g>
        <g id="mainLayer" clip-path="url(#posterClip)"></g>
        <g id="hitLayer" clip-path="url(#posterClip)"></g>
      </g>
    </svg>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const POSTER = { width: 760, height: 960 };
    const FONT_STACK = "Arial Black, Arial, Helvetica, sans-serif";

    const els = {
      mainText: document.querySelector("#mainText"),
      wordSize: document.querySelector("#wordSize"),
      wordSizeValue: document.querySelector("#wordSizeValue"),
      outlinePx: document.querySelector("#outlinePx"),
      outlineValue: document.querySelector("#outlineValue"),
      edgePx: document.querySelector("#edgePx"),
      edgeValue: document.querySelector("#edgeValue"),
      gridText: document.querySelector("#gridText"),
      gridSize: document.querySelector("#gridSize"),
      gridSizeValue: document.querySelector("#gridSizeValue"),
      columnGap: document.querySelector("#columnGap"),
      columnGapValue: document.querySelector("#columnGapValue"),
      rowGap: document.querySelector("#rowGap"),
      rowGapValue: document.querySelector("#rowGapValue"),
      gridSpeed: document.querySelector("#gridSpeed"),
      gridSpeedValue: document.querySelector("#gridSpeedValue"),
      wordGap: document.querySelector("#wordGap"),
      wordGapValue: document.querySelector("#wordGapValue"),
      bounce: document.querySelector("#bounce"),
      bounceValue: document.querySelector("#bounceValue"),
      friction: document.querySelector("#friction"),
      frictionValue: document.querySelector("#frictionValue"),
      resetWords: document.querySelector("#resetWords"),
      exportSvg: document.querySelector("#exportSvg"),
      svg: document.querySelector("#posterSvg"),
      posterGroup: document.querySelector("#posterGroup"),
      gridLayer: document.querySelector("#gridLayer"),
      clearanceLayer: document.querySelector("#clearanceLayer"),
      mainLayer: document.querySelector("#mainLayer"),
      hitLayer: document.querySelector("#hitLayer")
    };

    const measureCanvas = document.createElement("canvas");
    const measureCtx = measureCanvas.getContext("2d");

    let gridTiles = [];
    let wordBodies = [];
    let gridSignatureValue = "";
    let wordSignatureValue = "";
    let gridOffset = 0;
    let activeWord = null;
    let lastFrame = performance.now();

    function svgEl(name, attrs = {}) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      return node;
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function numberValue(element) {
      return Number(element.value);
    }

    function font(size) {
      return `900 ${size}px ${FONT_STACK}`;
    }

    function tokensFromInput() {
      const text = els.mainText.value.trim() || "Save the Date";
      return text.split(/\s+/).filter(Boolean).slice(0, 9);
    }

    function metricsFor(text, size) {
      measureCtx.font = font(size);
      const metrics = measureCtx.measureText(text);
      return {
        width: metrics.width,
        ascent: metrics.actualBoundingBoxAscent || size * 0.78,
        descent: metrics.actualBoundingBoxDescent || size * 0.18,
        left: metrics.actualBoundingBoxLeft || 0,
        right: metrics.actualBoundingBoxRight || metrics.width
      };
    }

    function fitSize(text, maxWidth, maxHeight, maxSize) {
      const at100 = metricsFor(text, 100).width || 100;
      const widthSize = (maxWidth / at100) * 100;
      return clamp(Math.min(widthSize, maxHeight, maxSize), 24, maxSize);
    }

    function wordBox(word, pad = 0) {
      return {
        left: word.x - word.metrics.left - pad,
        top: word.y - word.metrics.ascent - pad,
        right: word.x + word.metrics.right + pad,
        bottom: word.y + word.metrics.descent + pad,
        width: word.metrics.width + pad * 2,
        height: word.metrics.ascent + word.metrics.descent + pad * 2
      };
    }

    function updateReadouts() {
      els.wordSizeValue.textContent = `${els.wordSize.value}px`;
      els.outlineValue.textContent = `${els.outlinePx.value}px`;
      els.edgeValue.textContent = `${els.edgePx.value}px`;
      els.gridSizeValue.textContent = `${els.gridSize.value}px`;
      els.columnGapValue.textContent = `${els.columnGap.value}px`;
      els.rowGapValue.textContent = `${els.rowGap.value}px`;
      els.gridSpeedValue.textContent = els.gridSpeed.value;
      els.wordGapValue.textContent = `${els.wordGap.value}px`;
      els.bounceValue.textContent = `${els.bounce.value}%`;
      els.frictionValue.textContent = els.friction.value;
    }

    function rebuildWords(keepPositions = false) {
      const tokens = tokensFromInput();
      const oldWords = wordBodies;
      const targetSize = numberValue(els.wordSize);
      const edge = numberValue(els.edgePx);
      const band = (POSTER.height - edge * 2) / Math.max(1, tokens.length);

      clear(els.clearanceLayer);
      clear(els.mainLayer);
      clear(els.hitLayer);

      wordBodies = tokens.map((text, index) => {
        const size = fitSize(text, POSTER.width - edge * 2 - 18, Math.max(50, band * 0.86), targetSize);
        const metrics = metricsFor(text, size);
        const existing = keepPositions ? oldWords[index] : null;
        const x = existing ? existing.x : (POSTER.width - metrics.width) / 2;
        const y = existing ? existing.y : edge + band * index + band * 0.68 + metrics.ascent * 0.2;
        const mass = Math.max(1, (metrics.width * (metrics.ascent + metrics.descent)) / 9000);
        const maskNode = svgEl("text", { class: "mask-text" });
        const textNode = svgEl("text", { class: "main-text" });
        const hitNode = svgEl("rect", { class: "hit-box" });
        const word = {
          text,
          index,
          x,
          y,
          vx: existing ? existing.vx : 0,
          vy: existing ? existing.vy : 0,
          size,
          metrics,
          mass,
          maskNode,
          textNode,
          hitNode,
          dragging: false,
          dragDx: 0,
          dragDy: 0,
          lastPointerX: 0,
          lastPointerY: 0,
          lastPointerTime: performance.now()
        };

        maskNode.textContent = text;
        textNode.textContent = text;
        hitNode.addEventListener("pointerdown", (event) => startDrag(event, word));
        textNode.addEventListener("pointerdown", (event) => startDrag(event, word));
        els.clearanceLayer.appendChild(maskNode);
        els.mainLayer.appendChild(textNode);
        els.hitLayer.appendChild(hitNode);
        return word;
      });

      wordBodies.forEach((word) => {
        keepWordInsidePoster(word);
      });
      wordSignatureValue = wordSignature();
      updateWordNodes();
    }

    function wordSignature() {
      return [
        tokensFromInput().join("|"),
        els.wordSize.value,
        els.edgePx.value
      ].join("|");
    }

    function updateWordMetrics() {
      wordBodies.forEach((word) => {
        word.size = fitSize(word.text, POSTER.width - numberValue(els.edgePx) * 2 - 18, POSTER.height, numberValue(els.wordSize));
        word.metrics = metricsFor(word.text, word.size);
        word.mass = Math.max(1, (word.metrics.width * (word.metrics.ascent + word.metrics.descent)) / 9000);
      });
    }

    function updateWordNodes() {
      const outline = numberValue(els.outlinePx);
      wordBodies.forEach((word) => {
        const box = wordBox(word, 10);

        word.maskNode.setAttribute("x", word.x.toFixed(2));
        word.maskNode.setAttribute("y", word.y.toFixed(2));
        word.maskNode.setAttribute("font-size", word.size.toFixed(2));
        word.maskNode.setAttribute("stroke-width", (outline * 2).toFixed(2));

        word.textNode.setAttribute("x", word.x.toFixed(2));
        word.textNode.setAttribute("y", word.y.toFixed(2));
        word.textNode.setAttribute("font-size", word.size.toFixed(2));
        word.textNode.classList.toggle("dragging", word.dragging);

        word.hitNode.setAttribute("x", box.left.toFixed(2));
        word.hitNode.setAttribute("y", box.top.toFixed(2));
        word.hitNode.setAttribute("width", box.width.toFixed(2));
        word.hitNode.setAttribute("height", box.height.toFixed(2));
        word.hitNode.classList.toggle("dragging", word.dragging);
      });
    }

    function gridSignature() {
      return [
        els.gridText.value,
        els.gridSize.value,
        els.columnGap.value,
        els.rowGap.value
      ].join("|");
    }

    function rebuildGrid() {
      clear(els.gridLayer);
      gridTiles = [];
      gridOffset = 0;

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 32);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), 16);
      const rows = Math.ceil((POSTER.height + cellH) / cellH);
      const cols = Math.ceil((POSTER.width + cellW * 2) / cellW);

      for (let row = 0; row < rows; row += 1) {
        for (let col = -1; col < cols; col += 1) {
          const node = svgEl("text", {
            class: "grid-text",
            "font-size": size.toFixed(2)
          });
          node.textContent = text;
          els.gridLayer.appendChild(node);
          gridTiles.push({ row, col, node });
        }
      }

      gridSignatureValue = gridSignature();
    }

    function layoutGrid() {
      if (gridSignatureValue !== gridSignature()) rebuildGrid();

      const text = els.gridText.value.trim().toUpperCase() || "INDIGO 2026";
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(text, size);
      const edge = numberValue(els.edgePx);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 32);
      const cellH = Math.max(metrics.ascent + metrics.descent + numberValue(els.rowGap), 16);

      gridTiles.forEach((tile) => {
        const x = tile.col * cellW + edge - gridOffset;
        const y = tile.row * cellH + metrics.ascent + edge;
        tile.node.textContent = text;
        tile.node.setAttribute("font-size", size.toFixed(2));
        tile.node.setAttribute("x", x.toFixed(2));
        tile.node.setAttribute("y", y.toFixed(2));
      });
    }

    function keepWordInsidePoster(word) {
      const edge = numberValue(els.edgePx);
      const bounce = numberValue(els.bounce) / 100;
      const box = wordBox(word, numberValue(els.wordGap) / 2);

      if (box.left < edge) {
        word.x += edge - box.left;
        word.vx = Math.abs(word.vx) * bounce;
      }
      if (box.right > POSTER.width - edge) {
        word.x -= box.right - (POSTER.width - edge);
        word.vx = -Math.abs(word.vx) * bounce;
      }
      if (box.top < edge) {
        word.y += edge - box.top;
        word.vy = Math.abs(word.vy) * bounce;
      }
      if (box.bottom > POSTER.height - edge) {
        word.y -= box.bottom - (POSTER.height - edge);
        word.vy = -Math.abs(word.vy) * bounce;
      }
    }

    function resolveWordCollision(a, b) {
      const pad = numberValue(els.wordGap) / 2;
      const aBox = wordBox(a, pad);
      const bBox = wordBox(b, pad);

      if (
        aBox.right <= bBox.left ||
        aBox.left >= bBox.right ||
        aBox.bottom <= bBox.top ||
        aBox.top >= bBox.bottom
      ) {
        return;
      }

      const aCenterX = (aBox.left + aBox.right) / 2;
      const aCenterY = (aBox.top + aBox.bottom) / 2;
      const bCenterX = (bBox.left + bBox.right) / 2;
      const bCenterY = (bBox.top + bBox.bottom) / 2;
      const overlapX = Math.min(aBox.right - bBox.left, bBox.right - aBox.left);
      const overlapY = Math.min(aBox.bottom - bBox.top, bBox.bottom - aBox.top);
      let nx = 0;
      let ny = 0;
      let separation = 0;

      if (overlapX < overlapY) {
        nx = aCenterX < bCenterX ? -1 : 1;
        separation = overlapX;
      } else {
        ny = aCenterY < bCenterY ? -1 : 1;
        separation = overlapY;
      }

      const invA = a.dragging ? 0 : 1 / a.mass;
      const invB = b.dragging ? 0 : 1 / b.mass;
      const invSum = invA + invB;
      if (invSum === 0) return;

      const correction = separation + 0.8;
      a.x += nx * correction * (invA / invSum);
      a.y += ny * correction * (invA / invSum);
      b.x -= nx * correction * (invB / invSum);
      b.y -= ny * correction * (invB / invSum);

      const relativeVx = a.vx - b.vx;
      const relativeVy = a.vy - b.vy;
      const velocityAlongNormal = relativeVx * nx + relativeVy * ny;
      if (velocityAlongNormal > 0) return;

      const bounce = numberValue(els.bounce) / 100;
      const impulse = (-(1 + bounce) * velocityAlongNormal) / invSum;
      a.vx += impulse * invA * nx;
      a.vy += impulse * invA * ny;
      b.vx -= impulse * invB * nx;
      b.vy -= impulse * invB * ny;
    }

    function solvePhysics(dt) {
      const damping = Math.exp(-numberValue(els.friction) * dt);

      wordBodies.forEach((word) => {
        if (!word.dragging) {
          word.x += word.vx * dt;
          word.y += word.vy * dt;
          word.vx *= damping;
          word.vy *= damping;
          if (Math.abs(word.vx) < 1) word.vx = 0;
          if (Math.abs(word.vy) < 1) word.vy = 0;
        }
      });

      for (let iteration = 0; iteration < 5; iteration += 1) {
        for (let i = 0; i < wordBodies.length; i += 1) {
          for (let j = i + 1; j < wordBodies.length; j += 1) {
            resolveWordCollision(wordBodies[i], wordBodies[j]);
          }
        }
        wordBodies.forEach(keepWordInsidePoster);
      }
    }

    function pointerToPoster(event) {
      const point = els.svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(els.posterGroup.getScreenCTM().inverse());
    }

    function startDrag(event, word) {
      event.preventDefault();
      event.stopPropagation();
      const point = pointerToPoster(event);
      activeWord = word;
      word.dragging = true;
      word.dragDx = point.x - word.x;
      word.dragDy = point.y - word.y;
      word.lastPointerX = point.x;
      word.lastPointerY = point.y;
      word.lastPointerTime = performance.now();
      word.vx = 0;
      word.vy = 0;
      event.currentTarget.setPointerCapture(event.pointerId);
      updateWordNodes();
    }

    function moveDrag(event) {
      if (!activeWord) return;
      const point = pointerToPoster(event);
      const now = performance.now();
      const dt = Math.max(0.016, (now - activeWord.lastPointerTime) / 1000);
      const nextX = point.x - activeWord.dragDx;
      const nextY = point.y - activeWord.dragDy;
      activeWord.vx = (nextX - activeWord.x) / dt;
      activeWord.vy = (nextY - activeWord.y) / dt;
      activeWord.x = nextX;
      activeWord.y = nextY;
      activeWord.lastPointerX = point.x;
      activeWord.lastPointerY = point.y;
      activeWord.lastPointerTime = now;
      keepWordInsidePoster(activeWord);
      solvePhysics(0.016);
      updateWordNodes();
    }

    function endDrag() {
      if (!activeWord) return;
      activeWord.dragging = false;
      activeWord = null;
      updateWordNodes();
    }

    function resetWords() {
      rebuildWords(false);
    }

    function updateFromControls() {
      updateReadouts();
      if (wordSignatureValue !== wordSignature()) {
        rebuildWords(true);
      } else {
        updateWordMetrics();
        wordBodies.forEach(keepWordInsidePoster);
        updateWordNodes();
      }
      if (gridSignatureValue !== gridSignature()) {
        rebuildGrid();
      }
      layoutGrid();
    }

    function exportSvg() {
      const clone = els.svg.cloneNode(true);
      clone.setAttribute("xmlns", SVG_NS);
      const hitLayer = clone.querySelector("#hitLayer");
      if (hitLayer) hitLayer.replaceChildren();
      const source = `<?xml version="1.0" encoding="UTF-8"?>\n${new XMLSerializer().serializeToString(clone)}`;
      const blob = new Blob([source], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "collision-text-poster.svg";
      link.click();
      URL.revokeObjectURL(url);
    }

    function animate(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      const size = numberValue(els.gridSize);
      const metrics = metricsFor(els.gridText.value.trim().toUpperCase() || "INDIGO 2026", size);
      const cellW = Math.max(metrics.width + numberValue(els.columnGap), 32);
      gridOffset = (gridOffset + numberValue(els.gridSpeed) * dt) % cellW;
      solvePhysics(dt);
      layoutGrid();
      updateWordNodes();
      requestAnimationFrame(animate);
    }

    [
      els.mainText,
      els.wordSize,
      els.outlinePx,
      els.edgePx,
      els.gridText,
      els.gridSize,
      els.columnGap,
      els.rowGap,
      els.gridSpeed,
      els.wordGap,
      els.bounce,
      els.friction
    ].forEach((element) => {
      element.addEventListener("input", updateFromControls);
      element.addEventListener("change", updateFromControls);
    });

    document.addEventListener("pointermove", moveDrag);
    document.addEventListener("pointerup", endDrag);
    document.addEventListener("pointercancel", endDrag);
    els.resetWords.addEventListener("click", resetWords);
    els.exportSvg.addEventListener("click", exportSvg);

    updateReadouts();
    rebuildGrid();
    rebuildWords(false);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
